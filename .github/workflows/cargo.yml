# Anti-lock-in: the project MUST build and test with plain cargo, without Nix,
# on Linux and macOS (Принцип X, C-N-CI3).
name: cargo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          # Version comes from rust-toolchain.toml (single source of truth).
          toolchain: "1.85.0"
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- --deny warnings
      - run: cargo build --workspace
      - run: cargo test --workspace
