# First-party zsh shell package (T020, §FR-008, Принцип IV: shells are plugins).
# The binary payload is NOT committed: run ./fetch.sh to populate bin/<os>-<arch>/
# with static, relocatable zsh builds for the platform matrix below.

name = "zsh"
version = "5.8.0"
api_version = "1.0.0"
# Static musl builds work on any Linux libc; darwin builds are arch-specific.
targets = ["linux", "darwin"]

[provides]
shell = "zsh"
